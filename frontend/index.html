<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Quality Intelligence Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a; --panel: #1e293b; --panel2: #334155;
      --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      background: var(--panel); padding: 14px 20px; border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0 0 10px; font-size: 18px; }
    nav { display: flex; flex-wrap: wrap; gap: 6px; }
    nav button {
      background: var(--panel2); color: var(--text); border: 1px solid var(--border);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    nav button:hover { border-color: var(--accent); }
    nav button.active { background: var(--accent); color: #0f172a; font-weight: 600; }
    main { padding: 20px; max-width: 1100px; margin: 0 auto; }
    section { display: none; }
    section.active { display: block; }
    h2 { font-size: 20px; margin-top: 0; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
    }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: .5px; }
    tr:last-child td { border-bottom: none; }
    button.link { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    select, input {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      padding: 8px; border-radius: 6px; font-size: 14px;
    }
    input[type=number] { width: 90px; }
    .alert { border-left: 4px solid #ef4444; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .muted { color: var(--muted); }
    .error { color: #f87171; }
    canvas { background: var(--panel); border-radius: 10px; padding: 10px; margin-top: 12px; }
    .subhead { margin: 20px 0 8px; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  </style>
</head>
<body>
  <header>
    <h1>Air Quality Intelligence Platform</h1>
    <nav id="nav"></nav>
  </header>
  <main>
    <section id="dashboard"><h2>Dashboard</h2><div id="dashboard-body" class="muted">Loading…</div></section>
    <section id="summary"><h2>Summary</h2><div id="summary-body" class="muted">Loading…</div></section>
    <section id="stations"><h2>Monitoring Stations</h2><div id="stations-body" class="muted">Loading…</div></section>
    <section id="details">
      <h2>Station Details</h2>
      <div class="controls">
        <select id="details-select"></select>
      </div>
      <div id="details-body" class="muted">Select a station.</div>
    </section>
    <section id="prediction">
      <h2>AQI Prediction</h2>
      <div class="controls"><select id="prediction-select"></select></div>
      <div id="prediction-body" class="muted">Select a station.</div>
    </section>
    <section id="trend">
      <h2>AQI Trend</h2>
      <div class="controls">
        <select id="trend-select"></select>
        <label>Days <input type="number" id="trend-days" value="30" min="1" /></label>
        <button class="link" id="trend-go">Load</button>
      </div>
      <div id="trend-body" class="muted">Select a station.</div>
      <canvas id="trend-chart" height="120"></canvas>
    </section>
    <section id="history">
      <h2>AQI History</h2>
      <div class="controls"><select id="history-select"></select></div>
      <div id="history-body" class="muted">Select a station.</div>
      <canvas id="history-chart" height="120"></canvas>
    </section>
    <section id="alerts"><h2>Pollution Alerts</h2><div id="alerts-body" class="muted">Loading…</div></section>
    <section id="top"><h2>Top Polluted Locations</h2><div id="top-body" class="muted">Loading…</div></section>
  </main>

  <script>
    const API = "http://localhost:8000";

    async function api(path) {
      const r = await fetch(API + path);
      if (!r.ok) throw new Error(r.status + " " + r.statusText);
      return r.json();
    }

    const PAGES = [
      ["dashboard", "Dashboard"], ["summary", "Summary"], ["stations", "Stations"],
      ["details", "Station Details"], ["prediction", "Prediction"], ["trend", "AQI Trend"],
      ["history", "AQI History"], ["alerts", "Alerts"], ["top", "Top Polluted"],
    ];

    const loaded = {};        // pages loaded once
    let stationsCache = null; // shared /stations result

    // ---- helpers ----
    const el = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    const num = (v, d = 2) => (v === null || v === undefined) ? "—" : Number(v).toFixed(d);
    const fmtTime = (t) => t ? String(t).replace("T", " ").slice(0, 16) : "—";
    function fail(node, e) { node.innerHTML = `<p class="error">Failed to load: ${esc(e.message)}</p>`; }

    function card(label, value) {
      return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    async function getStations() {
      if (!stationsCache) stationsCache = await api("/stations");
      return stationsCache;
    }

    async function fillSelect(select, includeBlank) {
      const stations = await getStations();
      const opts = stations.map(s =>
        `<option value="${esc(s.id)}">${esc(s.station_name)} — ${esc(s.city)}</option>`).join("");
      select.innerHTML = (includeBlank ? '<option value="">Select a station…</option>' : "") + opts;
    }

    // ---- navigation ----
    const nav = el("nav");
    PAGES.forEach(([id, label]) => {
      const b = document.createElement("button");
      b.textContent = label;
      b.dataset.page = id;
      b.onclick = () => go(id);
      nav.appendChild(b);
    });

    function go(id, opts = {}) {
      document.querySelectorAll("section").forEach(s => s.classList.toggle("active", s.id === id));
      nav.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.page === id));
      loaders[id] && loaders[id](opts);
    }

    // ---- page loaders ----
    const loaders = {
      async dashboard() {
        if (loaded.dashboard) return; loaded.dashboard = true;
        const b = el("dashboard-body");
        try {
          const d = await api("/dashboard");
          if (!d || !Object.keys(d).length) { b.innerHTML = '<p class="muted">No data available. Run a sync first.</p>'; return; }
          b.innerHTML = `<div class="cards">
            ${card("Average AQI", num(d.average_aqi))}
            ${card("Total Stations", d.total_stations ?? "—")}
            ${card("Cities", d.cities ?? "—")}
            ${card("Worst Station", esc(d.worst_station))}
            ${card("Worst City", esc(d.worst_city))}
            ${card("Worst AQI", d.worst_aqi ?? "—")}
            ${card("Good Air Stations", d.good_air_stations ?? "—")}
            ${card("Moderate Air Stations", d.moderate_air_stations ?? "—")}
            ${card("Poor Air Stations", d.poor_air_stations ?? "—")}
          </div>`;
        } catch (e) { loaded.dashboard = false; fail(b, e); }
      },

      async summary() {
        if (loaded.summary) return; loaded.summary = true;
        const b = el("summary-body");
        try {
          const d = await api("/summary");
          b.innerHTML = `<div class="cards">
            ${card("Total Stations", d.stations ?? "—")}
            ${card("Average AQI", num(d.average_aqi))}
            ${card("Good", d.good ?? "—")}
            ${card("Moderate", d.moderate ?? "—")}
            ${card("Poor", d.poor ?? "—")}
            ${card("Very Poor", d.very_poor ?? "—")}
            ${card("Severe", d.severe ?? "—")}
          </div>`;
        } catch (e) { loaded.summary = false; fail(b, e); }
      },

      async stations() {
        if (loaded.stations) return; loaded.stations = true;
        const b = el("stations-body");
        try {
          const rows = await getStations();
          if (!rows.length) { b.innerHTML = '<p class="muted">No stations found.</p>'; return; }
          b.innerHTML = `<table><thead><tr>
            <th>Station</th><th>City</th><th>State</th><th>Coordinates</th><th>AQI</th><th></th>
          </tr></thead><tbody>${rows.map(s => `<tr>
            <td>${esc(s.station_name)}</td><td>${esc(s.city)}</td><td>${esc(s.state)}</td>
            <td class="muted">${num(s.latitude, 3)}, ${num(s.longitude, 3)}</td>
            <td>${s.aqi ?? "—"}</td>
            <td><button class="link" onclick="openDetails('${esc(s.id)}')">Details</button></td>
          </tr>`).join("")}</tbody></table>`;
        } catch (e) { loaded.stations = false; fail(b, e); }
      },

      async details(opts) {
        const sel = el("details-select");
        if (!loaded.details) { loaded.details = true; try { await fillSelect(sel, true); } catch (e) { return fail(el("details-body"), e); }
          sel.onchange = () => renderDetails(sel.value); }
        if (opts.stationId) { sel.value = opts.stationId; renderDetails(opts.stationId); }
      },

      async prediction() {
        const sel = el("prediction-select");
        if (loaded.prediction) return; loaded.prediction = true;
        try { await fillSelect(sel, true); } catch (e) { return fail(el("prediction-body"), e); }
        sel.onchange = () => renderPrediction(sel.value);
      },

      async trend() {
        const sel = el("trend-select");
        if (loaded.trend) return; loaded.trend = true;
        try { await fillSelect(sel, true); } catch (e) { return fail(el("trend-body"), e); }
        el("trend-go").onclick = () => renderTrend(sel.value, el("trend-days").value);
      },

      async history() {
        const sel = el("history-select");
        if (loaded.history) return; loaded.history = true;
        try { await fillSelect(sel, true); } catch (e) { return fail(el("history-body"), e); }
        sel.onchange = () => renderHistory(sel.value);
      },

      async alerts() {
        if (loaded.alerts) return; loaded.alerts = true;
        const b = el("alerts-body");
        try {
          const rows = await api("/alerts");
          if (!rows.length) { b.innerHTML = '<p class="muted">No active alerts.</p>'; return; }
          b.innerHTML = `<div class="cards">${rows.map(a => `<div class="card alert">
            <div class="label">⚠ ${esc(a.severity)}</div>
            <div class="value">${a.aqi}</div>
            <div>${esc(a.station)}</div>
            <div class="muted">${esc(a.city)}</div>
          </div>`).join("")}</div>`;
        } catch (e) { loaded.alerts = false; fail(b, e); }
      },

      async top() {
        if (loaded.top) return; loaded.top = true;
        const b = el("top-body");
        try {
          const rows = await api("/top-polluted");
          if (!rows.length) { b.innerHTML = '<p class="muted">No data available.</p>'; return; }
          b.innerHTML = `<table><thead><tr><th>Rank</th><th>City</th><th>Station</th><th>AQI</th></tr></thead>
            <tbody>${rows.map((r, i) => `<tr>
              <td>${i + 1}</td><td>${esc(r.city)}</td><td>${esc(r.station)}</td><td>${r.aqi}</td>
            </tr>`).join("")}</tbody></table>`;
        } catch (e) { loaded.top = false; fail(b, e); }
      },
    };

    // ---- detail renderers (triggered by selection) ----
    function openDetails(id) { go("details", { stationId: id }); }

    async function renderDetails(id) {
      const b = el("details-body");
      if (!id) { b.innerHTML = '<p class="muted">Select a station.</p>'; return; }
      b.innerHTML = '<p class="muted">Loading…</p>';
      try {
        const hist = await api(`/stations/${id}/history`);
        if (!hist.length) { b.innerHTML = '<p class="muted">No readings for this station.</p>'; return; }
        const latest = hist[0];
        const pollutants = [["PM2.5", latest.pm25], ["PM10", latest.pm10], ["CO", latest.co],
          ["NO2", latest.no2], ["SO2", latest.so2], ["O3", latest.o3]];
        const weather = [["Temperature", latest.temperature], ["Humidity", latest.humidity],
          ["Wind Speed", latest.wind_speed], ["Pressure", latest.pressure]];
        b.innerHTML = `
          <div class="subhead">Latest reading — ${fmtTime(latest.timestamp)} · AQI ${latest.aqi ?? "—"}</div>
          <div class="subhead">Pollutants</div>
          <div class="cards">${pollutants.map(([k, v]) => card(k, num(v))).join("")}</div>
          <div class="subhead">Weather</div>
          <div class="cards">${weather.map(([k, v]) => card(k, num(v))).join("")}</div>
          <div class="subhead">History</div>
          <table><thead><tr><th>Time</th><th>AQI</th><th>PM2.5</th><th>PM10</th></tr></thead>
          <tbody>${hist.map(r => `<tr><td>${fmtTime(r.timestamp)}</td><td>${r.aqi ?? "—"}</td>
            <td>${num(r.pm25)}</td><td>${num(r.pm10)}</td></tr>`).join("")}</tbody></table>`;
      } catch (e) { fail(b, e); }
    }

    async function renderPrediction(id) {
      const b = el("prediction-body");
      if (!id) { b.innerHTML = '<p class="muted">Select a station.</p>'; return; }
      b.innerHTML = '<p class="muted">Loading…</p>';
      try {
        const d = await api(`/ml/predict/${id}`);
        if (d.error || d.status === "failed") {
          b.innerHTML = `<p class="error">${esc(d.error || d.message)}</p>`; return;
        }
        b.innerHTML = `<div class="cards">
          ${card("Current AQI", num(d.current_aqi))}
          ${card("Predicted AQI", num(d.predicted_aqi))}
          ${card("Confidence", num(d.confidence) + "%")}
          ${card("Category", esc(d.category))}
        </div>
        <div class="subhead">Trend (${esc(d.prediction_for)})</div>
        <div class="card">${esc(d.trend)}</div>
        <div class="subhead">Health Advisory</div>
        <div class="card">${esc(d.health_advice)}</div>`;
      } catch (e) { fail(b, e); }
    }

    let trendChart, historyChart;
    function lineChart(canvasId, existing, labels, data, label) {
      if (existing) existing.destroy();
      return new Chart(el(canvasId), {
        type: "line",
        data: { labels, datasets: [{ label, data, borderColor: "#38bdf8", backgroundColor: "rgba(56,189,248,.15)", fill: true, tension: .3 }] },
        options: { scales: { x: { ticks: { color: "#94a3b8" } }, y: { ticks: { color: "#94a3b8" } } }, plugins: { legend: { labels: { color: "#e2e8f0" } } } },
      });
    }

    async function renderTrend(id, days) {
      const b = el("trend-body");
      if (!id) { b.innerHTML = '<p class="muted">Select a station.</p>'; return; }
      b.innerHTML = '<p class="muted">Loading…</p>';
      try {
        const rows = await api(`/aqi-trend?station_id=${encodeURIComponent(id)}&days=${encodeURIComponent(days || 30)}`);
        if (!rows.length) { b.innerHTML = '<p class="muted">No data for this period.</p>'; if (trendChart) trendChart.destroy(); return; }
        b.innerHTML = `<p class="muted">${rows.length} readings.</p>`;
        trendChart = lineChart("trend-chart", trendChart, rows.map(r => fmtTime(r.timestamp)), rows.map(r => r.aqi), "AQI");
      } catch (e) { fail(b, e); }
    }

    async function renderHistory(id) {
      const b = el("history-body");
      if (!id) { b.innerHTML = '<p class="muted">Select a station.</p>'; return; }
      b.innerHTML = '<p class="muted">Loading…</p>';
      try {
        const rows = await api(`/ml/history/${id}`);
        if (!rows.length) { b.innerHTML = '<p class="muted">No history.</p>'; if (historyChart) historyChart.destroy(); return; }
        b.innerHTML = `<p class="muted">${rows.length} readings.</p>`;
        historyChart = lineChart("history-chart", historyChart, rows.map(r => fmtTime(r.timestamp)), rows.map(r => r.aqi), "AQI");
      } catch (e) { fail(b, e); }
    }

    // start
    go("dashboard");
  </script>
</body>
</html>
